name: Auto-select PR Template

on:
  pull_request:
    types: [opened]

jobs:
  apply-template:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Apply template based on target branch
        uses: actions/github-script@v7
        with:
          script: |
            const base = context.payload.pull_request.base.ref;

            const templateMap = {
              'main': '.github/PULL_REQUEST_TEMPLATE/release.md',
              'develop': '.github/PULL_REQUEST_TEMPLATE/develop.md',
            };

            const templatePath = templateMap[base];

            if (!templatePath) {
              console.log(`No template configured for branch "${base}", skipping.`);
              return;
            }

            // Fetch template content directly via GitHub API (no checkout needed)
            const { data: fileData } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: templatePath,
            });

            const body = Buffer.from(fileData.content, 'base64').toString('utf8');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body,
            });

            console.log(`Applied template "${templatePath}" for PR targeting "${base}".`);